<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lazy Load Date Selector Test</title>

<style>
body{
font-family: Arial, sans-serif;
text-align:center;
margin-top:120px;
}

#textboxContainer{
display:none;
}

input{
padding:10px;
font-size:16px;
width:250px;
}

#loading{
font-size:18px;
color:gray;
}
</style>

<script>

function loadTextbox(){

setTimeout(function(){

document.getElementById("loading").style.display="none";
document.getElementById("textboxContainer").style.display="block";

},5000);

}

window.onload = loadTextbox;

</script>

</head>

<body>

<h1>Lazy Load Date Selector Test Page</h1>

<p id="loading">Date selector will load in 5 seconds...</p>

<div id="textboxContainer">

<label>Select Date:</label>

<br><br>

<input
type="text"
placeholder="1, 2, 3, 4 ..."
title="date selector with placeholder numbers"
onfocus="this.type='date'"
/>

</div>

</body>
</html>

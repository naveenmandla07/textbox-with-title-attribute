<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Date Selector Test</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 120px;
}

.date-container{
    display: inline-block;
    text-align: left;
}

label{
    font-weight: bold;
    display: block;
    margin-bottom: 8px;
}

input{
    padding: 10px;
    font-size: 16px;
    width: 220px;
}
</style>

</head>
<body>

<div class="date-container">

    <!-- Label attribute -->
    <label for="startDate">Select Date</label>

    <!-- Date selector with text and placeholder -->
    <input 
        type="text"
        id="startDate"
        name="startDate"
        placeholder="test data"
        text="Select Date"
        onfocus="(this.type='date')"
    >

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lazy Load Textbox Test</title>

<style>
body{
font-family: Arial, sans-serif;
text-align:center;
margin-top:120px;
}

#textboxContainer{
display:none;
}

input{
padding:10px;
font-size:16px;
width:250px;
}

#loading{
font-size:18px;
color:gray;
}
</style>

<script>

function loadTextbox(){

setTimeout(function(){

document.getElementById("loading").style.display="none";
document.getElementById("textboxContainer").style.display="block";

},5000);

}

window.onload = loadTextbox;

</script>

</head>

<body>

<h1>Lazy Load Wait Test Page</h1>

<p id="loading">Textbox will load in 5 seconds...</p>

<div id="textboxContainer">

<label>Enter Name:</label>

<br><br>

<input
type="text"
title="username textbox"
placeholder="Enter your name"
/>

</div>

</body>
</html>

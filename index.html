<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Date Selector Placeholder Test</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:100px;
}

input{
    padding:10px;
    font-size:16px;
}
</style>

</head>
<body>

<h2>Select Date</h2>

<!-- Date selector with placeholder attribute -->
<input 
    type="text"
    id="dateSelector"
    placeholder="test data"
    onfocus="(this.type='date')"
/>

</body>
</html>
